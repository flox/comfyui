      "uv": {
        "pkg-path": "uv",
        "pkg-group": "tools",
        "priority": 5
      }
    },
    "vars": {
      "COMFYUI_BASE_DIR": "$FLOX_ENV_CACHE/comfyui-runtime",
      "COMFYUI_DATABASE_URL": "sqlite:///$HOME/comfyui-work/user/comfyui.db",
      "COMFYUI_EXTRA_MODEL_PATHS": "$HOME/comfyui-work/extra_model_paths.yaml",
      "COMFYUI_INPUT_DIR": "$HOME/comfyui-work/input",
      "COMFYUI_LISTEN": "0.0.0.0",
      "COMFYUI_MODELS_DIR": "$HOME/comfyui-work/models",
      "COMFYUI_OUTPUT_DIR": "$HOME/comfyui-work/output",
      "COMFYUI_PORT": "8188",
      "COMFYUI_RUNTIME": "$FLOX_ENV_CACHE/comfyui-runtime",
      "COMFYUI_SOURCE": "$FLOX_ENV/share/comfyui",
      "COMFYUI_TEMP_DIR": "$FLOX_ENV_CACHE/temp",
      "COMFYUI_USER_DIR": "$HOME/comfyui-work/user",
      "COMFYUI_VENV_DIR": "$FLOX_ENV_CACHE/venv",
      "COMFYUI_WORK_DIR": "$HOME/comfyui-work",
      "PIP_CACHE_DIR": "$FLOX_ENV_CACHE/pip",
      "PYTHONWARNINGS": "ignore::requests.exceptions.RequestsDependencyWarning",
      "UV_CACHE_DIR": "$FLOX_ENV_CACHE/uv",
      "VIRTUAL_ENV": "$FLOX_ENV_CACHE/venv",
      "VIRTUAL_ENV_DISABLE_PROMPT": "1"
    },
    "hook": {
      "on-activate": "# Increase file descriptor limit (macOS defaults to 256, too low for ComfyUI)\nulimit -n 10240\n\n# Download models if get-models is available (Flox internal only)\n# External users must download models manually\nif [[ -x \"$FLOX_ENV/bin/get-models\" ]]; then\n  # Check if models are already installed\n  models_installed() {\n    [[ -f \"$HOME/comfyui-work/models/checkpoints/sd_xl_base_1.0.safetensors\" ]] && \\\n    [[ -f \"$HOME/comfyui-work/models/unet/flux1-dev.safetensors\" ]] && \\\n    [[ -f \"$HOME/comfyui-work/models/clip/t5xxl_fp16.safetensors\" ]]\n  }\n\n  if ! models_installed; then\n    echo \"\"\n    echo \"Models not found. Downloading from Flox R2 bucket...\"\n    echo \"This is a one-time download (~59GB) and may take a while.\"\n    echo \"\"\n    \"$FLOX_ENV/bin/get-models\"\n  fi\nfi\n\n# Setup ComfyUI (creates venv, installs pip packages)\n\"$FLOX_ENV/bin/comfyui-setup\"\n"
    },
    "profile": {
      "bash": "if [ -d \"$FLOX_ENV_CACHE/venv/bin\" ]; then\n  export PATH=\"$FLOX_ENV_CACHE/venv/bin:$PATH\"\nfi\n",
      "zsh": "if [ -d \"$FLOX_ENV_CACHE/venv/bin\" ]; then\n  export PATH=\"$FLOX_ENV_CACHE/venv/bin:$PATH\"\nfi\n",
      "fish": "if test -d \"$FLOX_ENV_CACHE/venv/bin\"\n    set -gx PATH \"$FLOX_ENV_CACHE/venv/bin\" $PATH\nend\n"
    },
    "options": {
      "systems": [
        "aarch64-darwin",
        "aarch64-linux",
        "x86_64-linux",
        "x86_64-darwin"
      ],
      "cuda-detection": true
    },
    "services": {
      "comfyui": {
        "command": "comfyui-start"
      }
    }
  },
